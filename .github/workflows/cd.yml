name: CD Pipeline

on:
  workflow_run:
    workflows: ["Docker CI/CD Pipeline"]
    types:
        - completed

jobs:
  build:
    runs-on: self-hosted
    if: github.event.workflow_run.conclusion == 'success'

    steps:
    - name: Pull Docker Image
      run: sudo docker pull kshitijsingh1076222/cicd-pipeline:latest
    - name: Delete Old Docker Image
      run: sudo docker rm -f cicd-pipeline-container || true
    - name: Run Docker Container
      run: sudo docker run -d -p 8080:8080 --name cicd-pipeline-container kshitijsingh1076222/cicd-pipeline:latest
